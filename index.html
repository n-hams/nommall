<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nommall.hub</title>
  <style>
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: white;
    }

    /* CAPA INICIAL COM IMAGEM */
    .hero-section {
      position: relative;
      height: 100vh;
      width: 100%;
      background-image: url('assets/asdasdasdasd.jpg.png'); 
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* HEADER */
    .header {
      position: fixed;
      top: 50px; left: 50px; right: 50px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      z-index: 2000;
      mix-blend-mode: difference; 
      color: white; 
    }

    .nav-group { display: flex; gap: 25px; }

    .nav-item {
      text-decoration: none;
      color: white;
      transition: opacity 0.3s ease, transform 0.1s ease;
      opacity: 0.7;
    }

    .logo { font-size: 24px; font-weight: bold; opacity: 1; }
    .btn-link { font-size: 12px; font-weight: 200; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }

    .nav-item:hover { opacity: 1; }
    .nav-item:active { transform: scale(0.95); }

    /* STATUS TEXT FIXED */
    .status-container {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 500;
      pointer-events: none;
      mix-blend-mode: difference;
    }

    .status-text {
      font-size: 36px; font-weight: bold; color: white;
      text-transform: uppercase; opacity: 0.3; margin: 0;
    }

    /* SEÇÕES */
    #projects { width: 100%; height: 5760px; background-color: white; }

    #contact {
      width: 100%;
      height: 100vh;
      background-color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* LAYOUT CONTATO */
    .contact-container {
      width: 80%;
      max-width: 1200px;
      display: flex;
      justify-content: space-between;
      align-items: stretch;
    }

    .social-links {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .social-item {
      font-size: 12px; font-weight: 200;
      text-transform: uppercase; text-decoration: none;
      color: black; letter-spacing: 1px;
    }

    /* FORMULÁRIO AJUSTADO */
    .form-container {
      width: 60%;
      display: flex;
      flex-direction: column;
    }

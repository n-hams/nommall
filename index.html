<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nommall.hub</title>
  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: white; /* Garante que o fundo geral é branco */
    }

    /* TELA INICIAL (CAPA COM IMAGEM) */
    .hero-section {
      position: relative;
      height: 100vh; /* Ocupa 100% da altura da tela */
      width: 100%;
      /* VERIFIQUE SE O CAMINHO ABAIXO ESTÁ CORRETO NO SEU GITHUB */
      background-image: url('assets/asdasdasdasd.jpg.png'); 
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* CABEÇALHO FIXO */
    .header {
      position: fixed;
      top: 50px;
      left: 50px;
      right: 50px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      z-index: 1000;
      /* Faz o texto inverter a cor automaticamente sobre o fundo */
      mix-blend-mode: difference; 
      color: white; 
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      text-decoration: none;
      color: inherit;
    }

    .btn-projects {
      font-size: 12px;
      font-weight: 200;
      text-decoration: none;
      color: inherit;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* TEXTO CENTRAL (IN DEVELOPMENT) */
    .status-text {
      font-size: 36px;
      font-weight: bold;
      color: #e0e0e0;
      text-transform: uppercase;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
    }

    /* SEÇÃO PROJECTS (BRANCA E LONGA) */
    #projects {
      width: 100%;
      height: 5760px; /* Altura de scroll */
      background-color: white;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end; /* Joga o footer para o final dos 5760px */
    }

    footer {
      padding-bottom: 40px;
      text-align: center;
      width: 100%;
    }

    footer p {
      font-size: 14px;
      color: black;
      margin: 0;
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="#" class="logo">Nommall.hub</a>
    <a href="#projects" class="btn-projects">Projects</a>
  </div>

  <section class="hero-section">
    <p class="status-text">in development</p>
  </section>

  <section id="projects">
    <footer>
      <p>© 2025 Nommall.hub</p>
    </footer>
  </section>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nommall.hub</title>
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: white; overflow-x: hidden; }

    /* BARRA DE TRANSPARÊNCIA NO TOPO (Atrás do texto) */
    .header-overlay {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 120px;
      background: rgba(255, 255, 255, 0.4); /* Transparência branca */
      backdrop-filter: blur(8px); /* Efeito de vidro */
      z-index: 1999;
      transition: opacity 0.5s ease; /* Transição suave */
      pointer-events: none; /* Não atrapalha cliques */
    }

    /* TEXTO DO HEADER (Logo e Menu) */
    .header {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 40px 50px; display: flex; justify-content: space-between;
      align-items: baseline; z-index: 2000; 
      color: black; /* Letra preta conforme pedido */
    }

    .nav-group { display: flex; gap: 25px; }
    .nav-item { text-decoration: none; color: black; opacity: 0.8; transition: 0.3s; }
    .logo { font-size: 24px; font-weight: bold; }
    .btn-link { font-size: 12px; font-weight: 200; text-transform: uppercase; letter-spacing: 1px; }

    /* STATUS TEXT (IN DEVELOPMENT) */
    .status-container {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 500; pointer-events: none; text-align: center; width: 90%;
    }
    .status-text {
      font-size: 36px; font-weight: bold; color: black;
      text-transform: uppercase; opacity: 0.1; 
      white-space: nowrap; /* NÃO PULA LINHA */
    }

    /* CAPA INICIAL */
    .hero-section {
      height: 100vh; width: 100%;
      background-image: url('asdasdasdasd.jpg.png'); 
      background-size: cover; background-position: center; background-repeat: no-repeat;
    }

    /* ANIMAÇÃO DO FONE */
    .scroll-sequence-container {
      position: relative; width: 100%; height: 3000px; background-color: white;
    }
    .sticky-sequence {
      position: sticky; top: 0; height: 100vh; width: 100%;
      display: flex; justify-content: center; align-items: center;
      opacity: 0; transition: opacity 0.3s ease;
    }
    canvas { width: 960px; height: 540px; max-width: 95vw; height: auto; }

    /* CONTATO */
    #contact {
      width: 100%; min-height: 100vh; background-color: white;
      display: flex; justify-content: center; align-items: center; position: relative;
      padding: 80px 0;
    }
    .contact-container { width: 85%; max-width: 1200px; display: flex; justify-content: space-between; }
    .form-container { width: 60%; display: flex; flex-direction: column; }
    
    input, textarea { border: 1px solid black; padding: 12px; outline: none; font-size: 16px; }
    textarea { height: 300px; resize: none; margin-bottom: 10px; }

    /* BOTÃO SEND (FIX CELULAR) */
    .btn-send { 
      align-self: flex-end; background: black; color: white; /* Preto com fundo para visibilidade */
      border: none; padding: 10px 30px; font-size: 12px; 
      text-transform: uppercase; cursor: pointer;
      z-index: 10; display: block; visibility: visible !important; opacity: 1 !important;
    }

    footer { position: absolute; bottom: 30px; width: 100%; text-align: center; font-size: 10px; opacity: 0.5; }

    /* --- RESPONSIVIDADE CELULAR --- */
    @media (max-width: 768px) {
      .header { padding: 25px 20px; }
      .header-overlay { height: 80px; }
      .nav-group { gap: 15px; } /* Melhora espaçamento entre botões */
      .logo { font-size: 18px; }
      .status-text { font-size: 5vw; } /* Diminui para caber na linha conforme o tamanho da tela */
      
      .contact-container { flex-direction: column; gap: 40px; }
      .form-container { width: 100%; }
      .social-links { display: flex; flex-direction: row; gap: 20px; margin-bottom: 20px; }
      
      .btn-send { width: 100%; padding: 15px; background: black; color: white; } /* Botão grande no celular */
    }
  </style>
</head>
<body>

  <div class="header-overlay" id="header-overlay"></div>
  
  <div class="header">
    <a href="#" class="nav-item logo">Nommall.hub</a>
    <div class="nav-group">
      <a href="#contact" class="nav-item btn-link">Contact</a>
      <a href="#projects" class="nav-item btn-link">Projects</a>
    </div>
  </div>

  <div class="status-container">
    <p class="status-text">in development</p>
  </div>

  <section class="hero-section"></section>

  <div id="projects" class="scroll-sequence-container">
    <div class="sticky-sequence" id="sticky-sequence">
      <canvas id="sequence-canvas"></canvas>
    </div>
  </div>

  <section id="contact">
    <div class="contact-container">
      <div class="social-links">
          <a href="https://www.instagram.com/hugocom_h/" target="_blank" class="nav-item btn-link" style="display:block;">Instagram</a>
          <a href="https://www.behance.net/Hugoal92" target="_blank" class="nav-item btn-link" style="display:block;">Behance</a>
          <a href="https://www.linkedin.com/in/hugo-alexandre-maas-663984134/" target="_blank" class="nav-item btn-link" style="display:block;">Linkedin</a>
      </div>
      <form class="form-container" action="https://formspree.io/f/myknolql" method="POST">
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:10px;">
          <span style="font-size:12px; text-transform:uppercase; color: black; white-space: nowrap;">E-mail</span>
          <input type="email" name="email" required style="flex-grow:1;">
        </div>
        <textarea name="message" placeholder="Message" required></textarea>
        <button type="submit" class="btn-send">Send</button>
      </form>
    </div>
    <footer><p>© 2025 Nommall.hub</p></footer>
  </section>

  <script>
    const canvas = document.getElementById("sequence-canvas");
    const context = canvas.getContext("2d");
    const stickyContainer = document.getElementById("sticky-sequence");
    const section = document.getElementById("projects");
    const overlay = document.getElementById("header-overlay");

    canvas.width = 960;
    canvas.height = 540;

    const frameCount = 76;
    const currentFrame = index => `sequence/Seq_${index.toString().padStart(5, '0')}.png`;

    const images = [];
    const airbnb = { frame: 0 };

    for (let i = 0; i < frameCount; i++) {
      const img = new Image();
      img.src = currentFrame(i);
      images.push(img);
    }

    images[0].onload = render;

    function render() {
      context.clearRect(0, 0, canvas.width, canvas.height);
      if (images[airbnb.frame]) {
        context.drawImage(images[airbnb.frame], 0, 0);
      }
    }

    window.addEventListener("scroll", () => {
      const scrollTop = window.pageYOffset;
      const startAnim = section.offsetTop;
      const sectionHeight = section.offsetHeight;
      const viewportHeight = window.innerHeight;

      // --- EFEITO: Transparência do Topo sumindo no scroll ---
      let scrollFactor = scrollTop / 300; // Desaparece nos primeiros 300px de scroll
      overlay.style.opacity = Math.max(0, 1 - scrollFactor);

      // Visibilidade da animação
      if (scrollTop >= startAnim - 200 && scrollTop <= startAnim + sectionHeight) {
        stickyContainer.style.opacity = "1";
      } else {
        stickyContainer.style.opacity = "0";
      }

      // Cálculo do frame
      const relativeScroll = scrollTop - startAnim;
      const scrollFraction = relativeScroll / (sectionHeight - viewportHeight);
      let frameIndex = Math.min(frameCount - 1, Math.max(0, Math.floor(scrollFraction * frameCount)));

      airbnb.frame = frameIndex;
      render();
    });
  </script>
</body>
</html>

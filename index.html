<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nommall.hub</title>
  <style>
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: white;
    }

    /* CAPA */
    .hero-section {
      position: relative;
      height: 100vh;
      width: 100%;
      background-image: url('assets/asdasdasdasd.jpg.png'); 
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* HEADER */
    .header {
      position: fixed;
      top: 50px;
      left: 50px;
      right: 50px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      z-index: 2000;
      mix-blend-mode: difference; 
      color: white; 
    }

    .nav-group {
      display: flex;
      gap: 25px; /* Espaço entre Contact e Projects */
    }

    .nav-item {
      text-decoration: none;
      color: white;
      text-shadow: -0.5px -0.5px 0 rgba(255,255,255,0.2), 0.5px -0.5px 0 rgba(255,255,255,0.2);
      transition: opacity 0.3s ease, transform 0.1s ease;
      opacity: 0.7;
    }

    .logo { font-size: 24px; font-weight: bold; opacity: 1; }
    .btn-link { font-size: 12px; font-weight: 200; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }

    .nav-item:hover { opacity: 1; }
    .nav-item:active { transform: scale(0.95); }

    /* IN DEVELOPMENT */
    .status-container {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 500;
      pointer-events: none;
      mix-blend-mode: difference;
    }

    .status-text {
      font-size: 36px; font-weight: bold; color: white;
      text-transform: uppercase; opacity: 0.3; margin: 0;
    }

    /* SEÇÕES */
    #projects { width: 100%; height: 5760px; background-color: white; }

    #contact {
      width: 100%;
      height: 100vh; /* Seção de contato ocupa uma tela cheia no final */
      background-color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* LAYOUT DE CONTATO (Conforme sua imagem) */
    .contact-container {
      width: 80%;
      max-width: 1200px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .social-links {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .social-item {
      font-size: 12px;
      font-weight: 200;
      text-transform: uppercase;
      text-decoration: none;
      color: black;
      letter-spacing: 1px;
      transition: opacity 0.3s;
    }

    .social-item:hover { opacity: 0.5; }

    /* FORMULÁRIO */
    .form-container {
      width: 50%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .form-row { display: flex; align-items: center; gap: 15px; }
    .form-label { font-size: 12px; font-weight: 200; text-transform: uppercase; }

    input, textarea {
      width: 100%;
      border: 1px solid black;
      padding: 10px;
      font-family: Arial, sans-serif;
      outline: none;
    }

    textarea { height: 300px; resize: none; }

    .btn-send {
      align-self: flex-end;
      background: none;
      border: none;
      font-size: 12px;
      font-weight: 200;
      text-transform: uppercase;
      cursor: pointer;
      padding: 10px 0;
      transition: transform 0.1s;
    }

    .btn-send:active { transform: scale(0.9); }

    footer { position: absolute; bottom: 40px; width: 100%; text-align: center; }
    footer p { font-size: 10px; color: black; opacity: 0.5; }

  </style>
</head>
<body>

  <div class="header">
    <a href="#" class="nav-item logo">Nommall.hub</a>
    <div class="nav-group">
      <a href="#contact" class="nav-item btn-link">Contact</a>
      <a href="#projects" class="nav-item btn-link">Projects</a>
    </div>
  </div>

  <div class="status-container">
    <p class="status-text">in development</p>
  </div>

  <section class="hero-section"></section>

  <section id="projects"></section>

  <section id="contact">
    <div class="contact-container">
      
      <div class="social-links">
        <a href="https://www.instagram.com/hugocom_h/" target="_blank" class="social-item">Instagram</a>
        <a href="https://www.behance.net/Hugoal92" target="_blank" class="social-item">Behance</a>
        <a href="https://www.linkedin.com/in/hugo-alexandre-maas-663984134/" target="_blank" class="social-item">Linkedin</a>
      </div>

      <form class="form-container" action="https://formspree.io/f/myknolql">
        <div class="form-row">
          <span class="form-label">E-mail</span>
          <input type="email" name="email" required>
        </div>
        <textarea name="message" required></textarea>
        <button type="submit" class="btn-send">Send</button>
      </form>

    </div>

    <footer>
      <p>© 2025 Nommall.hub</p>
    </footer>
  </section>

</body>
</html>

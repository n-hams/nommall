<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nommall.hub</title>
  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: white;
    }

    /* TELA INICIAL (CAPA) */
    .hero-section {
      position: relative;
      height: 100vh;
      width: 100%;
      background-image: url('assets/asdasdasdasd.jpg'); 
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* CABEÇALHO (Logo e Botões) */
    .header {
      position: fixed;
      top: 50px;
      left: 50px;
      right: 50px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      z-index: 2000;
      /* Mágica da cor reversa + borda fina */
      mix-blend-mode: difference; 
      color: white; 
    }

    /* Estilo comum para Logo e Botões */
    .nav-item {
      text-decoration: none;
      color: white;
      /* Borda fina (stroke) que inverte com o mix-blend-mode */
      text-shadow: 
        -0.5px -0.5px 0 rgba(255,255,255,0.2),  
         0.5px -0.5px 0 rgba(255,255,255,0.2),
        -0.5px  0.5px 0 rgba(255,255,255,0.2),
         0.5px  0.5px 0 rgba(255,255,255,0.2);
      transition: opacity 0.3s ease, transform 0.1s ease;
      opacity: 0.7; /* Começa um pouco mais "apagado" */
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      opacity: 1; /* Logo sempre forte */
    }

    .btn-link {
      font-size: 12px;
      font-weight: 200;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
    }

    /* ANIMAÇÃO SUTIL AO PASSAR O MOUSE */
    .nav-item:hover {
      opacity: 1; /* Intensidade total */
    }

    /* ANIMAÇÃO DE CLIQUE (MOVIMENTO DE APERTADO) */
    .nav-item:active {
      transform: scale(0.95); /* Diminui levemente como se afundasse */
    }

    /* TEXTO "IN DEVELOPMENT" ESTÁTICO */
    .status-container {
      position: fixed; /* Fica parado na tela durante o scroll */
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 500;
      pointer-events: none; /* Garante que não atrapalhe cliques no site */
      mix-blend-mode: difference;
    }

    .status-text {
      font-size: 36px;
      font-weight: bold;
      color: white;
      text-transform: uppercase;
      opacity: 0.3; /* Intensidade reduzida em mais de 50% para ser discreto */
      margin: 0;
    }

    /* SEÇÃO PROJECTS (BRANCA E LONGA) */
    #projects {
      width: 100%;
      height: 5760px; 
      background-color: white;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    footer {
      padding-bottom: 40px;
      text-align: center;
    }

    footer p {
      font-size: 14px;
      color: black;
      mix-blend-mode: normal; /* Footer sempre preto no fundo branco */
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="#" class="nav-item logo">Nommall.hub</a>
    
    <a href="#projects" class="nav-item btn-link">Projects</a>
  </div>

  <div class="status-container">
    <p class="status-text">in development</p>
  </div>

  <section class="hero-section"></section>

  <section id="projects">
    <footer>
      <p>© 2025 Nommall.hub</p>
    </footer>
  </section>

</body>
</html>

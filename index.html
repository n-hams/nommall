  <title>Nommall.hub</title>
  <style>
    body {
      margin: 0;
      /* Configuração da Imagem de Fundo */
      background-image: url('asdasdasdasd.jpg.png'); /* Certifique-se que o nome do arquivo está correto */
      background-size: cover;      /* Faz a imagem cobrir a tela toda */
      background-position: center; /* Centraliza a imagem */
      background-attachment: fixed;/* Mantém o fundo fixo ao rolar */
      background-repeat: no-repeat;
      background-color: #1a1a1a;   /* Cor de fundo caso a imagem falhe */
      
      color: white; /* Alterado para branco para melhor leitura sobre a imagem */
      font-family: Arial, sans-serif;
      height: 100vh;
    }

    .logo {
      position: absolute;
      top: 50px;
      left: 50px;
      width: 148px;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5); /* Sombra para destacar do fundo */
    }

    .status-container {
      position: absolute; 
      top: 50%; 
      left: 50%; 
      transform: translate(-50%, -50%);
      text-align: center;
      width: 100%;
    }

    .status-text {
      font-size: 36px; 
      color: #e0e0e0; 
      font-weight: bold; 
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
    }

    footer {
      position: absolute; 
      bottom: 40px; 
      width: 100%; 
      text-align: center;
    }

    footer p {
      font-size: 14px; 
      color: white;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    }

    @media (max-width: 600px) {
      .logo {
        left: 20px;
        top: 20px;
        font-size: 20px;
      }
      .status-text {
        font-size: 28px;

<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nommall.hub</title>
  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: white; /* Fundo geral é branco */
    }

    /* TELA INICIAL (CAPA) */
    .hero-section {
      position: relative;
      height: 100vh; /* Ocupa a tela inteira */
      width: 100%;
      background-image: url('assets/asdasdasdasd.jpg'); /* Ajuste aqui se o caminho mudar */
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* CABEÇALHO (Logo na esquerda, Botão na direita) */
    .header {
      position: fixed;
      top: 50px;
      left: 50px;
      right: 50px; /* Adicionado para permitir alinhar à direita */
      display: flex;
      justify-content: space-between; /* Joga um para cada lado */
      align-items: center;
      z-index: 1000;
      mix-blend-mode: difference; /* MÁGICA: O texto fica branco no escuro e preto no claro automaticamente */
      color: white; 
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      text-decoration: none;
      color: white;
    }

    .btn-projects {
      font-size: 12px;
      font-weight: 200;
      text-decoration: none;
      color: white;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* TEXTO CENTRAL DA CAPA */
    .status-text {
      font-size: 36px;
      font-weight: bold;
      color: #e0e0e0;
      text-transform: uppercase;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
      margin: 0;
    }

    /* TELA PROJECTS (ABAIXO DA CAPA) */
    #projects {
      width: 100%;
      height: 5760px; /* Altura que você pediu */
      background-color: white;
      display: flex;
      flex-direction: column;
      justify-content: flex-end; /* Joga o conteúdo (footer) para o final */
    }

    /* COPYRIGHT NO FINAL DO SCROLL */
    footer {
      padding-bottom: 40px;
      text-align: center;
      color: black;
    }

    footer p {
      font-size: 14px;
      margin: 0;
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="#" class="logo">Nommall.hub</a>
    <a href="#projects" class="btn-projects">Projects</a>
  </div>

  <section class="hero-section">
    <p class="status-text">in development</p>
  </section>

  <section id="projects">
    <footer>
      <p>© 2025 Nommall.hub</p>
    </footer>
  </section>

</body>

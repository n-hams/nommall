<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nommall.hub</title>
  <style>
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: white;
    }

    /* CAPA INICIAL */
    .hero-section {
      position: relative;
      height: 100vh;
      width: 100%;
      background-image: url('asdasdasdasd.jpg.png'); 
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* HEADER COM TRANSPARÊNCIA */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 40px 50px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      z-index: 2000;
      background: rgba(255, 255, 255, 0.4); /* Transparência branca */
      backdrop-filter: blur(5px); /* Efeito de vidro */
      transition: opacity 0.5s ease, visibility 0.5s ease;
      color: black; /* Letra preta conforme pedido */
    }

    .nav-group { display: flex; gap: 25px; }

    .nav-item {
      text-decoration: none;
      color: black;
      transition: opacity 0.3s ease, transform 0.1s ease;
      opacity: 0.8;
    }

    .logo { font-size: 24px; font-weight: bold; opacity: 1; }
    .btn-link { font-size: 12px; font-weight: 200; text-transform: uppercase; letter-spacing: 1px; }

    .nav-item:hover { opacity: 1; }
    .nav-item:active { transform: scale(0.95); }

    /* STATUS TEXT (IN DEVELOPMENT) */
    .status-container {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 500;
      pointer-events: none;
      text-align: center;
      width: 90%; /* Evita que encoste nas bordas */
    }

    .status-text {
      font-size: 36px; 
      font-weight: bold; 
      color: black; /* Mudado para preto */
      text-transform: uppercase; 
      opacity: 0.2; 
      margin: 0;
      white-space: nowrap; /* Garante que não pule linha */
    }

    /* SEÇÕES */
    #projects { width: 100%; height: 5760px; background-color: white; }

    #contact {
      width: 100%;
      min-height: 100vh;
      background-color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      padding: 100px 0;
    }

    .contact-container {
      width: 85%;
      max-width: 1200px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    /* FORMULÁRIO */
    .form-container { width: 60%; display: flex; flex-direction: column; }
    .form-row { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
    .form-label { font-size: 12px; font-weight: 200; text-transform: uppercase; }

    input, textarea {
      border: 1px solid black;
      padding: 10px;
      font-family: Arial, sans-serif;
      outline: none;
      box-sizing: border-box;
    }
    input { flex-grow: 1; } 
    textarea { height: 350px; resize: none; width: 100%; margin-bottom: 5px; }

    .btn-send {
      align-self: flex-end;
      background: none;
      border: none;
      font-size: 12px;
      font-weight: 200;
      text-transform: uppercase;
      cursor: pointer;
      color: black !important; /* Força cor preta no celular */
      opacity: 1 !important;
      padding: 10px 0;
    }

    /* RESPONSIVIDADE CELULAR */
    @media (max-width: 768px) {
      .header { padding: 20px; }
      .nav-group { gap: 15px; }
      .logo { font-size: 18px; }
      .status-text { font-size: 20px; } /* Diminui para caber em uma linha */
      
      .contact-container { flex-direction: column; gap: 50px; }
      .form-container { width: 100%; }
      .social-links { order: 2; } /* Links sociais embaixo no celular */
    }

    footer { position: absolute; bottom: 40px; width: 100%; text-align: center; }
    footer p { font-size: 10px; color: black; opacity: 0.5; }

  </style>
</head>
<body>

  <div class="header" id="main-header">
    <a href="#" class="nav-item logo">Nommall.hub</a>
    <div class="nav-group">
      <a href="#contact" class="nav-item btn-link">Contact</a>
      <a href="#projects" class="nav-item btn-link">Projects</a>
    </div>
  </div>

  <div class="status-container">
    <p class="status-text">in development</p>
  </div>

  <section class="hero-section"></section>
  <section id="projects"></section>

  <section id="contact">
    <div class="contact-container">
      <div class="social-links">
        <a href="https://www.instagram.com/hugocom_h/" target="_blank" class="social-item nav-item" style="color: black; display: block; margin-bottom: 20px; font-size: 12px; text-decoration: none; text-transform: uppercase;">Instagram</a>
        <a href="https://www.behance.net/Hugoal92" target="_blank" class="social-item nav-item" style="color: black; display: block; margin-bottom: 20px; font-size: 12px; text-decoration: none; text-transform: uppercase;">Behance</a>
        <a href="https://www.linkedin.com/in/hugo-alexandre-maas-663984134/" target="_blank" class="social-item nav-item" style="color: black; display: block; font-size: 12px; text-decoration: none; text-transform: uppercase;">Linkedin</a>
      </div>

      <form class="form-container" action="https://formspree.io/f/myknolql" method="POST">
        <div class="form-row">
          <span class="form-label">E-mail</span>
          <input type="email" name="email" required>
        </div>
        <textarea name="message" required></textarea>
        <button type="submit" class="btn-send">Send</button>
      </form>
    </div>
    <footer><p>© 2025 Nommall.hub</p></footer>
  </section>

  <script>
    // Lógica para sumir com o header transparente no scroll
    window.onscroll = function() {
      var header = document.getElementById("main-header");
      if (window.pageYOffset > 100) {
        header.style.opacity = "0";
        header.style.visibility = "hidden";
      } else {
        header.style.opacity = "1";
        header.style.visibility = "visible";
      }
    };
  </script>

</body>
</html>
